<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SaaS Analyzer - Input State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#5e5f65",
                        "on-error": "#fff7f6",
                        "tertiary-dim": "#53506b",
                        "on-error-container": "#752121",
                        "on-primary": "#f8f7ff",
                        "tertiary": "#5f5c78",
                        "primary-dim": "#0048c1",
                        "primary": "#0053db",
                        "inverse-on-surface": "#9b9d9e",
                        "tertiary-fixed": "#d3ceef",
                        "surface-tint": "#0053db",
                        "secondary-container": "#e2e2e9",
                        "on-surface": "#2b3437",
                        "on-secondary": "#f9f8ff",
                        "error-dim": "#4e0309",
                        "tertiary-container": "#d3ceef",
                        "on-tertiary-fixed": "#34314b",
                        "primary-fixed": "#dbe1ff",
                        "surface-bright": "#f8f9fa",
                        "error-container": "#fe8983",
                        "primary-container": "#dbe1ff",
                        "outline": "#737c7f",
                        "tertiary-fixed-dim": "#c5c0e0",
                        "surface-container-low": "#f1f4f6",
                        "surface-dim": "#d1dce0",
                        "secondary-fixed": "#e2e2e9",
                        "on-secondary-fixed": "#3e3f45",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#504e69",
                        "on-tertiary-container": "#47445f",
                        "on-secondary-container": "#505157",
                        "on-primary-fixed-variant": "#0050d4",
                        "secondary-fixed-dim": "#d4d4db",
                        "inverse-primary": "#618bff",
                        "inverse-surface": "#0c0f10",
                        "on-tertiary": "#fcf7ff",
                        "surface-variant": "#dbe4e7",
                        "on-primary-fixed": "#003798",
                        "background": "#f8f9fa",
                        "on-surface-variant": "#586064",
                        "secondary-dim": "#515359",
                        "on-background": "#2b3437",
                        "surface-container-high": "#e2e9ec",
                        "error": "#9f403d",
                        "surface-container": "#eaeff1",
                        "primary-fixed-dim": "#c7d3ff",
                        "on-primary-container": "#0048bf",
                        "surface-container-highest": "#dbe4e7",
                        "outline-variant": "#abb3b7",
                        "on-secondary-fixed-variant": "#5a5b61"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopNavBar: Included because this is a primary application screen, acting as the main dashboard/input area -->
<div class="relative flex h-auto w-full flex-col bg-surface group/design-root overflow-x-hidden">
<header class="flex items-center justify-between whitespace-nowrap bg-surface_container_lowest px-10 py-4 shadow-[0_1px_0_0_rgba(171,179,183,0.2)]">
<div class="flex items-center gap-4 text-on-surface">
<div class="size-6 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-on-surface text-xl font-bold leading-tight tracking-[-0.015em] font-headline">SaaS Analyzer</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 bg-surface_container_high" data-alt="Abstract minimal geometric pattern in soft gray tones representing user profile" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAtDm7Q8EyDDES9SoxedIHd5CNA2YJlbeCZOKHjAlaSl4Cnhy230yShhGtejwojBL7K5mIxG2NvhvSWSiH6Fvre9gSwWSzlJCJ-7F7liIqKRZsQM-iDhBuOtf8aXrEf4s7XydygKtaPoXliVg3--FHMS0U-_Sj0aAblUGNYTr3DdRyw1K8_9MjJ13S_gv-7c14FRN7zRY2bOkZWVio5nFpqD97N-rK5pm2wioBlBUdvEjrag3Mp_eq4TgRKvBMQUCFtU3ovV5Lg43A');"></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-start py-12 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-3xl space-y-8">
<!-- Header Section -->
<div class="space-y-2 text-center pb-4">
<h1 class="text-on-surface text-4xl sm:text-[2.75rem] font-bold leading-tight tracking-[-0.02em] font-headline">Analyze Landing Page</h1>
<p class="text-on-surface-variant text-lg font-body">Configure your analysis parameters below.</p>
</div>
<!-- Main Configuration Card -->
<div class="bg-surface_container_lowest rounded-xl p-8 space-y-10 shadow-[0_4px_32px_0_rgba(43,52,55,0.04)]">
<!-- Target URL -->
<div class="space-y-4">
<label class="block text-on-surface font-semibold text-lg font-title-md" for="url-input">Target Landing Page URL</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="link">link</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface_container_lowest border border-outline-variant/20 rounded-lg text-on-surface placeholder-on-surface-variant/50 focus:ring-0 focus:border-primary focus:shadow-[0_0_0_3px_rgba(199,211,255,0.3)] transition-all duration-200 font-body text-lg" id="url-input" placeholder="https://example.com" type="url" value=""/>
</div>
</div>
<!-- Sections to Analyze -->
<div class="space-y-6">
<h3 class="text-on-surface font-semibold text-lg font-title-md">Sections to Analyze</h3>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<label class="relative flex cursor-pointer p-4 bg-surface_container_low rounded-lg hover:bg-surface_variant transition-colors group">
<div class="flex items-center h-5">
<input checked="" class="h-5 w-5 rounded border-outline-variant/50 bg-surface_container_lowest text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary" type="checkbox"/>
</div>
<div class="ml-3 text-base">
<span class="font-medium text-on-surface font-body">Hero Section</span>
</div>
</label>
<label class="relative flex cursor-pointer p-4 bg-surface_container_low rounded-lg hover:bg-surface_variant transition-colors group">
<div class="flex items-center h-5">
<input checked="" class="h-5 w-5 rounded border-outline-variant/50 bg-surface_container_lowest text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary" type="checkbox"/>
</div>
<div class="ml-3 text-base">
<span class="font-medium text-on-surface font-body">Call to Action (CTA)</span>
</div>
</label>
<label class="relative flex cursor-pointer p-4 bg-surface_container_low rounded-lg hover:bg-surface_variant transition-colors group">
<div class="flex items-center h-5">
<input checked="" class="h-5 w-5 rounded border-outline-variant/50 bg-surface_container_lowest text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary" type="checkbox"/>
</div>
<div class="ml-3 text-base">
<span class="font-medium text-on-surface font-body">Social Proof</span>
</div>
</label>
</div>
</div>
<!-- Competitors -->
<div class="space-y-6">
<div class="flex items-center justify-between">
<div class="space-y-1">
<h3 class="text-on-surface font-semibold text-lg font-title-md">Competitor Context</h3>
<p class="text-on-surface-variant text-sm font-body">Auto-detected for baseline comparison.</p>
</div>
<button class="text-primary hover:text-primary-dim text-sm font-medium flex items-center gap-1 font-label transition-colors" type="button">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                                Add Custom
                            </button>
</div>
<div class="bg-surface_container_low rounded-lg p-2 flex flex-wrap gap-2">
<div class="inline-flex items-center gap-2 bg-surface_container_lowest px-4 py-2 rounded-full shadow-[0_1px_2px_0_rgba(43,52,55,0.05)] border border-outline-variant/10">
<div class="w-5 h-5 rounded bg-surface_container_high flex items-center justify-center">
<span class="text-xs font-bold text-on-surface-variant">L</span>
</div>
<span class="text-sm font-medium text-on-surface font-body">Linear</span>
<button class="text-on-surface-variant hover:text-on-surface focus:outline-none">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<div class="inline-flex items-center gap-2 bg-surface_container_lowest px-4 py-2 rounded-full shadow-[0_1px_2px_0_rgba(43,52,55,0.05)] border border-outline-variant/10">
<div class="w-5 h-5 rounded bg-surface_container_high flex items-center justify-center">
<span class="text-xs font-bold text-on-surface-variant">Lm</span>
</div>
<span class="text-sm font-medium text-on-surface font-body">Loom</span>
<button class="text-on-surface-variant hover:text-on-surface focus:outline-none">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<div class="inline-flex items-center gap-2 bg-surface_container_lowest px-4 py-2 rounded-full shadow-[0_1px_2px_0_rgba(43,52,55,0.05)] border border-outline-variant/10">
<div class="w-5 h-5 rounded bg-surface_container_high flex items-center justify-center">
<span class="text-xs font-bold text-on-surface-variant">N</span>
</div>
<span class="text-sm font-medium text-on-surface font-body">Notion</span>
<button class="text-on-surface-variant hover:text-on-surface focus:outline-none">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
</div>
<!-- Action -->
<div class="pt-6 flex justify-end">
<button class="bg-gradient-to-br from-primary to-primary-dim text-on-primary font-medium text-base px-8 py-4 rounded-lg shadow-[0_4px_12px_0_rgba(0,83,219,0.2)] hover:shadow-[0_6px_16px_0_rgba(0,83,219,0.3)] transition-all duration-200 flex items-center gap-2 font-label" type="button">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
                            Start Analysis
                        </button>
</div>
</div>
</div>
</main>
</div>
</body></html>
